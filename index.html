<body>
    <script>
        // React + Google Translate crash monkeypatch
        if (typeof Node === 'function' && Node.prototype) {
            const originalRemoveChild = Node.prototype.removeChild;
            Node.prototype.removeChild = function(child) {
                if (child.parentNode !== this) {
                    if (console) console.warn('Cannot remove a child from a different parent', child, this);
                    return child;
                }
                return originalRemoveChild.apply(this, arguments);
            };

            const originalInsertBefore = Node.prototype.insertBefore;
            Node.prototype.insertBefore = function(newNode, referenceNode) {
                if (referenceNode && referenceNode.parentNode !== this) {
                    if (console) console.warn('Cannot insert before a reference node from a different parent', referenceNode, this);
                    return newNode;
                }
                return originalInsertBefore.apply(this, arguments);
            };

            const originalReplaceChild = Node.prototype.replaceChild;
            Node.prototype.replaceChild = function(newChild, oldChild) {
                if (oldChild && oldChild.parentNode !== this) {
                    if (console) console.warn('Cannot replace a child from a different parent', oldChild, this);
                    return oldChild;
                }
                return originalReplaceChild.apply(this, arguments);
            };
        }
    </script>
    <script>
        // Force cookie from local storage for iframe compatibility
        try {
            const stored = localStorage.getItem('greyquant_user_settings');
            if (stored) {
                const settings = JSON.parse(stored);
                if (settings.language) {
                    const langMap = {
                        'English': 'en',
                        'French': 'fr',
                        'Arabic': 'ar',
                        'Spanish': 'es',
                        'Persian': 'fa'
                    };
                    const langCode = langMap[settings.language] || 'en';
                    
                    document.cookie = 'googtrans=/en/' + langCode + '; path=/; domain=' + window.location.hostname + '; SameSite=None; Secure';
                    document.cookie = 'googtrans=/en/' + langCode + '; path=/; SameSite=None; Secure';
                    
                    if (langCode === 'ar' || langCode === 'fa') {
                        document.documentElement.dir = 'rtl';
                    } else {
                        document.documentElement.dir = 'ltr';
                    }
                    document.documentElement.lang = langCode;
                }
            }
        } catch (e) {}
    </script>
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');

        try {
            if (location.pathname === '/' && !location.hash) {
                // Check if we are not in a blob or special protocol that might forbid this
                if (location.protocol === 'http:' || location.protocol === 'https:') {
                    // location.replace('./#/');
                }
            }
        } catch (e) {
            console.warn("Auto-redirect to hash URL skipped:", e);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
