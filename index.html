
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreyAlpha</title>
    
    <!-- Icon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">

    <script>
        window.addEventListener('error', function(event) {
            console.error('Global error caught:', event.error || event.message);
            // Don't alert, just log it so we can see it in the console
        });
        // Polyfill process for browser environment
        window.process = window.process || { env: {} };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Updated to Inter + JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Added for Landing Page -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
        // Redirect to hash-based URL for PWA compatibility
        // Wrapped in try-catch to prevent errors in Blob/Sandbox environments where location modification is restricted
        try {
            if (location.pathname === '/' && !location.hash) {
                // Check if we are not in a blob or special protocol that might forbid this
                if (location.protocol === 'http:' || location.protocol === 'https:') {
                    location.replace('./#/');
                }
            }
        } catch (e) {
            console.warn("Auto-redirect to hash URL skipped:", e);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
