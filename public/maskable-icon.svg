<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Full bleed background for adaptive masking -->
  <rect width="512" height="512" fill="#0f172a"/>
  
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="alphaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Stylized Alpha Symbol (Centered and scaled to fit safe area) -->
  <g transform="translate(128, 128) scale(0.5)">
    <path d="M448 256C448 362.035 362.035 448 256 448C149.965 448 64 362.035 64 256C64 149.965 149.965 64 256 64C362.035 64 448 149.965 448 256Z" stroke="url(#alphaGradient)" stroke-width="24" stroke-linecap="round" opacity="0.2"/>
    <path d="M160 384C160 384 192 256 256 256C320 256 352 384 352 384" stroke="url(#alphaGradient)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M256 256C256 256 320 128 384 128C448 128 480 256 480 256" stroke="url(#alphaGradient)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="256" cy="256" r="50" fill="url(#alphaGradient)"/>
  </g>
</svg>
